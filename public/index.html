<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexican Train Live</title>
    <style>
        body { background-color: #1e293b; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; flex-direction: column; display: flex; overflow: hidden; }
        .hidden { display: none !important; }
        #lobby { max-width: 500px; margin: 40px auto; background-color: #0f172a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #lobby h1 { color: #f59e0b; margin-top: 0; text-align: center; font-size: 28px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; background-color: #334155; border: 1px solid #475569; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 10px; font-size: 15px; transition: 0.2s; }
        .btn-yellow { background-color: #f59e0b; color: #0f172a; }
        .btn-slate { background-color: #475569; color: white; }
        .btn-emerald { background-color: #059669; color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* REPARATIE: Scroll-omgeving voor de actieve kamers */
        .room-scroll-area { max-height: 200px !important; overflow-y: auto !important; padding-right: 4px; }
        .room-box { background-color: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .room-info { font-size: 14px; }
        .room-info strong { color: #f59e0b; font-size: 16px; }
        .room-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; }

        header { background-color: #0f172a; border-bottom: 4px solid #000000; padding: 12px; flex-shrink: 0; }
        #playerHeaderRow { display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; gap: 12px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .player-status-card { padding: 8px 16px; border-radius: 8px; border: 1px solid #475569; text-align: center; min-w: 110px; font-size: 13px; background-color: #1e293b; color: #cbd5e1; }
        .player-status-card.active { background-color: rgba(245, 158, 11, 0.15); border-color: #f59e0b; font-weight: bold; color: #fde047; }
        .player-status-card .stats { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        #gameStatusSummary { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 8px; display: flex; justify-content: center; gap: 24px; }

        #doubleWarningBanner { background-color: #dc2626; color: white; font-weight: bold; padding: 8px; text-align: center; font-size: 13px; flex-shrink: 0; border-bottom: 4px solid #000000; }

        main { flex: 1; background-color: #1e293b; overflow-x: auto; overflow-y: auto; min-height: 0; width: 100%; display: flex; }
        #tracksMasterContainer, #playerTracksContainer { height: auto; min-height: 100%; display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; align-items: flex-start; }
        
        .train-column { display: flex; flex-direction: column; min-width: 160px; max-width: 160px; min-height: 100%; background-color: #0f172a; border-right: 4px solid #000000; box-sizing: border-box; cursor: pointer; flex-shrink: 0; }
        .train-column.double-highlight { background-color: rgba(220, 38, 38, 0.1); border-left: 2px solid #dc2626; }
        .column-header { text-align: center; border-bottom: 4px solid #000000; padding: 12px 8px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; background-color: #0f172a; }
        .column-header .title { font-weight: bold; color: #e2e8f0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 140px; }
        .column-header .title.me { color: #38bdf8; }
        .column-header .score-stn { font-size: 11px; color: #94a3b8; }
        .column-header .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; background-color: #334155; color: #94a3b8; }
        .column-header .status-badge.open { background-color: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
        .column-header .bounce-badge { font-size: 10px; background-color: #f97316; color: #0f172a; padding: 1px 6px; border-radius: 4px; font-weight: bold; margin-top: 2px; }

        .stones-scroll-area { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 4px; }
        .track-stone { background: #ffffff; color: #111111; padding: 6px; border-radius: 6px; font-size: 16px; font-weight: bold; border: 2px solid #475569; text-align: center; width: 42px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); flex-shrink: 0; box-sizing: border-box; }
        .track-stone .line { width: 100%; border-top: 2px solid #94a3b8; margin: 3px 0; }

        footer { background-color: #020617; border-top: 4px solid #000000; padding: 15px; flex-shrink: 0; z-index: 10; }
        .footer-container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .action-buttons { display: flex; gap: 10px; }
        .action-buttons button { padding: 8px 18px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; color: white; }
        .btn-draw { background-color: #2563eb; }
        .btn-pass { background-color: #ea580c; }
        .action-buttons button:disabled { opacity: 0.2; cursor: not-allowed; }

        #myHand { width: 100% !important; max-width: 100% !important; display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; overflow: hidden !important; justify-content: center !important; align-items: center !important; gap: 4px !important; min-height: 95px !important; padding: 8px !important; box-sizing: border-box !important; container-type: inline-size; }
        .domino { background: #fefefe; color: #111111; font-weight: bold; border-radius: 6px; border: 2px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 52px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; flex: 1 1 auto !important; padding: 0; box-sizing: border-box !important; overflow: hidden; }
        .domino .line { width: 100%; border-top: 2px solid #64748b; margin: 4px 0; }
        .domino span { font-size: min(18px, 3.5cqw) !important; line-height: 1 !important; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>🚂 MEXICAN TRAIN</h1>
        <div class="form-group">
            <label>Jouw Spelersnaam</label>
            <input id="nameInp" type="text" placeholder="Vul je naam in...">
        </div>
        <div style="border-top: 1px solid #334155; padding-top: 15px; margin-top: 15px;">
            <h3 style="font-size: 15px; color: #f59e0b; margin-bottom: 10px;">Maak een nieuwe Spelkamer:</h3>
            <div class="form-group" style="display: flex; gap: 10px; margin-bottom: 5px;">
                <input id="newRoomInp" type="text" placeholder="Kamernaam..." style="flex: 1;">
                <button onclick="createNewRoom()" class="btn btn-yellow" style="width: auto; margin: 0; padding: 0 20px;">Maak aan</button>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Maximale Steen voor deze nieuwe kamer</label>
                <input id="maxStoneInp" type="number" value="12">
            </div>
        </div>
        <div style="border-top: 1px solid #334155; padding-top: 15px; margin-top: 20px;">
            <h3 style="font-size: 15px; color: #94a3b8; margin-bottom: 10px;">Beschikbare Spelkamers:</h3>
            <!-- REPARATIE: De room-scroll-area zorgt voor een nette scrollbalk in het menu -->
            <div id="roomListContainer" class="room-scroll-area no-scrollbar"></div>
        </div>
        <div id="wachtruimteSectie" class="hidden" style="border-top: 1px solid #334155; padding-top: 15px; margin-top: 20px;">
            <h3 style="font-size: 14px; color: #34d399; margin-bottom: 8px;">Je zit in kamer: <span id="currentRoomTitle" style="font-weight: bold; color: white;">-</span></h3>
            <ul id="playerList" style="padding-left: 20px; margin: 0; color: #cbd5e1; font-size: 14px;"></ul>
            <button id="lobbyStartBtn" onclick="start()" class="btn btn-emerald" style="margin-top: 15px;">Spel Starten voor deze kamer</button>
        </div>
    </div>
    <!-- MAIN GAME BOARD -->
    <div id="board" class="hidden">
        <header>
            <div id="playerHeaderRow" class="no-scrollbar"></div>
            <div id="gameStatusSummary">
                <span>Ronde: <strong id="roundNumberLabel">-</strong></span>
                <span>Centrale steen: <strong id="centerStone">-</strong></span>
                <span>In de pot: <strong id="boneyardCount">-</strong></span>
            </div>
        </header>
        <div id="doubleWarningBanner">⚠️ VERPLICHTING: Er ligt een open dubbelsteen! Je moet hier eerst verplicht aanleggen.</div>
        <main class="no-scrollbar">
            <div id="tracksMasterContainer">
                <div onclick="selectTrain('mexican')" id="mexicanTrackCard" class="train-column">
                    <div class="column-header">
                        <div class="title" style="color: #34d399;">🚂 Mexican Train</div>
                        <div class="status-badge" style="background-color: #064e3b; color: #6ee7b7; border: 1px solid #047857;">ALTIJD OPEN</div>
                    </div>
                    <div id="mexicanTrack" class="stones-scroll-area"></div>
                </div>
                <div id="playerTracksContainer"></div>
            </div>
        </main>
        <footer>
            <div class="footer-container">
                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Geselecteerd: <strong id="selectedStoneLabel">-</strong> | Status: <span id="drawStatusLabel" style="font-weight: bold;">-</span></div>
                <div class="action-buttons">
                    <button id="drawBtn" onclick="draw()" class="btn-draw">Pak Steen</button>
                    <button id="passBtn" onclick="pass()" class="btn-pass">Pas / Open Trein</button>
                </div>
                <div id="myHand" class="no-scrollbar"></div>
            </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script src="engine/gameEngine.js"></script>
</body>
</html>
