<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexican Train Live</title>
    <script src="https://tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .domino { background: #fefefe; color: #111; font-weight: bold; border-radius: 6px; border: 2px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s; }
        .domino:hover { transform: translateY(-4px); border-color: #fbbf24; }
        .track-stone { background: #fff; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; border: 1px solid #444; text-align: center; width: 50px; flex-shrink: 0; }
        /* Verberg scrollbars maar behoud scrollen */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-800 text-white min-h-screen font-sans flex flex-col overflow-hidden">

    <!-- LOBBY SCREEN -->
    <div id="lobby" class="max-w-md mx-auto my-20 bg-slate-900 p-8 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-black mb-6 text-center text-yellow-400">🚂 MEXICAN TRAIN</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Jouw Naam</label>
                <input id="nameInp" type="text" class="w-full p-2.5 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-yellow-400">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Maximale Steen (Aantal ogen)</label>
                <input id="maxStoneInp" type="number" value="12" class="w-full p-2.5 rounded bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-yellow-400">
            </div>
            <button onclick="join()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-bold p-3 rounded transition">Deelnemen</button>
            <button onclick="spectate()" class="w-full bg-slate-600 hover:bg-slate-700 text-white font-bold p-3 rounded transition">Kijken (Spectator)</button>
            <button onclick="start()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3 rounded transition">Spel Starten voor iedereen</button>
        </div>
        <div class="mt-6 border-t border-slate-700 pt-4">
            <h3 class="text-sm font-bold text-slate-400 mb-2">Wachtruimte:</h3>
            <ul id="playerList" class="list-disc list-inside text-slate-300"></ul>
        </div>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="board" class="hidden flex-1 flex flex-col min-h-0">
        
        <!-- 1. BOVENSTE BALK: SPELERS STATUS NAAST ELKAAR -->
        <header class="bg-slate-900 border-b border-slate-700 p-3 shadow-md flex-shrink-0">
            <div id="playerHeaderRow" class="flex gap-3 overflow-x-auto no-scrollbar justify-center items-center">
                <!-- Dynamisch gevuld via app.js -->
            </div>
            <div id="gameStatusSummary" class="text-center text-xs text-slate-400 mt-2 flex justify-center gap-6">
                <span>Ronde: <strong id="roundNumberLabel" class="text-white">-</strong></span>
                <span>Centrale steen: <strong id="centerStone" class="text-yellow-400">-</strong></span>
                <span>In de pot: <strong id="boneyardCount" class="text-white">-</strong></span>
            </div>
        </header>

        <!-- VERPLICHTING WAARSCHUWING BANNER -->
        <div id="doubleWarningBanner" class="hidden bg-red-600 text-white font-black p-2 text-center shadow-lg text-xs tracking-wide flex-shrink-0">
            ⚠️ VERPLICHTING: Er ligt een open dubbelsteen! Je moet hier eerst verplicht aanleggen.
        </div>

        <!-- 2. MIDDENVELD: VERTICALE KOLOMMEN NAAST ELKAAR -->
        <main class="flex-1 flex gap-4 p-4 overflow-x-auto overflow-y-hidden bg-slate-850 items-start justify-start min-h-0">
            
            <!-- Algemene Mexican Train Kolom -->
            <div onclick="selectTrain('mexican')" id="mexicanTrackCard" class="bg-slate-900 p-3 rounded-xl border-2 border-transparent cursor-pointer transition flex flex-col min-w-[140px] max-h-full h-full shadow-lg">
                <div class="text-center font-bold text-emerald-400 text-sm border-b border-slate-700 pb-2 mb-2 flex-shrink-0">
                    🚂 Mexican Train
                </div>
                <div id="mexicanTrack" class="flex flex-col gap-2 overflow-y-auto no-scrollbar items-center flex-1 py-1">
                    <!-- Stenen lopen hier naar onder -->
                </div>
            </div>

            <!-- Container voor Spelerstreinen Kolommen -->
            <div id="playerTracksContainer" class="flex gap-4 max-h-full h-full items-start">
                <!-- Dynamisch gevuld via app.js -->
            </div>

        </main>

        <!-- 3. ONDERSTE BALK: GECENTREERDE HAND -->
        <footer class="bg-slate-950 border-t border-slate-800 p-4 shadow-inner z-10 flex-shrink-0">
            <div class="max-w-3xl mx-auto flex flex-col items-center gap-2">
                <div class="text-xs text-slate-400">
                    Geselecteerd: <span id="selectedStoneLabel" class="text-yellow-400 font-bold">-</span> | 
                    Status: <span id="drawStatusLabel" class="text-blue-400 font-bold">-</span>
                </div>
                <div class="flex gap-2 mb-1">
                    <button id="drawBtn" onclick="draw()" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded font-bold text-xs disabled:opacity-30">Pak Steen</button>
                    <button id="passBtn" onclick="pass()" class="bg-orange-600 hover:bg-orange-700 px-3 py-1.5 rounded font-bold text-xs disabled:opacity-30">Pas / Open Trein</button>
                </div>
                <!-- Hand gecentreerd onderaan -->
                <div id="myHand" class="w-full flex gap-2 justify-center overflow-x-auto py-1 no-scrollbar min-h-[90px]">
                    <!-- Stenen komen hier -->
                </div>
            </div>
        </footer>

    </div>

    <script src="app.js"></script>
</body>
</html>
