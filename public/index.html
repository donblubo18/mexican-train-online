<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexican Train Live</title>
    <style>
        body { background-color: #1e293b; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; flex-direction: column; display: flex; overflow: hidden; }
        .hidden { display: none !important; }
        #lobby { max-width: 400px; margin: 80px auto; background-color: #0f172a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #lobby h1 { color: #f59e0b; margin-top: 0; text-align: center; font-size: 28px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; background-color: #334155; border: 1px solid #475569; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 10px; font-size: 15px; transition: 0.2s; }
        .btn-yellow { background-color: #f59e0b; color: #0f172a; }
        .btn-slate { background-color: #475569; color: white; }
        .btn-emerald { background-color: #059669; color: white; }
        header { background-color: #0f172a; border-bottom: 4px solid #000000; padding: 12px; flex-shrink: 0; }
        #playerHeaderRow { display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; gap: 12px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .player-status-card { padding: 8px 16px; border-radius: 8px; border: 1px solid #475569; text-align: center; min-w: 110px; font-size: 13px; background-color: #1e293b; color: #cbd5e1; }
        .player-status-card.active { background-color: rgba(245, 158, 11, 0.15); border-color: #f59e0b; font-weight: bold; color: #fde047; }
        .player-status-card .stats { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        #gameStatusSummary { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 8px; display: flex; justify-content: center; gap: 24px; }
        #doubleWarningBanner { background-color: #dc2626; color: white; font-weight: bold; padding: 8px; text-align: center; font-size: 13px; flex-shrink: 0; border-bottom: 4px solid #000000; }
        main { flex: 1; background-color: #1e293b; overflow-x: auto; overflow-y: hidden; min-height: 0; width: 100%; display: flex; }
        #tracksMasterContainer, #playerTracksContainer { height: 100%; display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; align-items: stretch; }
        .train-column { display: flex; flex-direction: column; min-width: 160px; max-width: 160px; height: 100%; background-color: #0f172a; border-right: 4px solid #000000; box-sizing: border-box; cursor: pointer; flex-shrink: 0; }
        .column-header { text-align: center; border-bottom: 4px solid #000000; padding: 12px 8px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; background-color: #0f172a; }
        .column-header .title { font-weight: bold; color: #e2e8f0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 140px; }
        .column-header .score-stn { font-size: 11px; color: #94a3b8; }
        .column-header .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; background-color: #334155; color: #94a3b8; }
        .column-header .status-badge.open { background-color: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
        .stones-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 4px; min-height: 0; }
        .track-stone { background: #ffffff; color: #111111; padding: 6px; border-radius: 6px; font-size: 16px; font-weight: bold; border: 2px solid #475569; text-align: center; width: 42px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); flex-shrink: 0; box-sizing: border-box; }
        .track-stone .line { width: 100%; border-top: 2px solid #94a3b8; margin: 3px 0; }
        footer { background-color: #020617; border-top: 4px solid #000000; padding: 15px; flex-shrink: 0; z-index: 10; }
        .footer-container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .action-buttons { display: flex; gap: 10px; }
        .action-buttons button { padding: 8px 18px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; color: white; }
        .btn-draw { background-color: #2563eb; }
        .btn-pass { background-color: #ea580c; }
        #myHand { width: 100% !important; max-width: 600px !important; display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; overflow-x: auto !important; justify-content: flex-start !important; align-items: center !important; gap: 8px !important; min-height: 90px !important; padding: 5px !important; box-sizing: border-box !important; }
        .domino { background: #fefefe; color: #111111; font-weight: bold; border-radius: 6px; border: 2px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 52px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; cursor: grab; flex-shrink: 0; padding: 0; }
        .domino .line { width: 100%; border-top: 2px solid #64748b; margin: 4px 0; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>🚂 MEXICAN TRAIN</h1>
        <div class="form-group"><label>Jouw Naam</label><input id="nameInp" type="text" placeholder="Naam..."></div>
        <div class="form-group"><label>Maximale Steen</label><input id="maxStoneInp" type="number" value="12"></div>
        <button id="lobbyJoinBtn" onclick="join()" class="btn btn-yellow">Deelnemen</button>
        <button id="lobbySpectateBtn" onclick="spectate()" class="btn btn-slate">Kijken</button>
        <button id="lobbyStartBtn" onclick="start()" class="btn btn-emerald">Spel Starten</button>
        <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
            <h3 style="font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Wachtruimte:</h3>
            <ul id="playerList" style="padding-left: 20px; margin: 0; color: #cbd5e1; font-size: 14px;"></ul>
        </div>
    </div>
    <div id="board" class="hidden">
        <header>
            <div id="playerHeaderRow" class="no-scrollbar"></div>
            <div id="gameStatusSummary">
                <span>Ronde: <strong id="roundNumberLabel">-</strong></span>
                <span>Centrale steen: <strong id="centerStone">-</strong></span>
                <span>In de pot: <strong id="boneyardCount">-</strong></span>
            </div>
        </header>
        <div id="doubleWarningBanner">⚠️ VERPLICHTING: Er ligt een open dubbelsteen!</div>
        <main class="no-scrollbar">
            <div id="tracksMasterContainer">
                <div onclick="selectTrain('mexican')" id="mexicanTrackCard" class="train-column">
                    <div class="column-header">
                        <div class="title" style="color: #34d399;">🚂 Mexican Train</div>
                        <div class="status-badge" style="background-color: #064e3b; color: #6ee7b7; border: 1px solid #047857;">OPEN</div>
                    </div>
                    <div id="mexicanTrack" class="stones-scroll-area no-scrollbar"></div>
                </div>
                <div id="playerTracksContainer"></div>
            </div>
        </main>
        <footer>
            <div class="footer-container">
                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Geselecteerd: <strong id="selectedStoneLabel">-</strong> | Status: <span id="drawStatusLabel" style="font-weight:bold;">-</span></div>
                <div class="action-buttons">
                    <button id="drawBtn" onclick="draw()" class="btn-draw">Pak Steen</button>
                    <button id="passBtn" onclick="pass()" class="btn-pass">Pas / Open Trein</button>
                </div>
                <div id="myHand" class="no-scrollbar"></div>
            </div>
        </footer>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <!-- Verwijst correct naar de submap engine/ -->
    <script src="engine/gameEngine.js"></script>
</body>
</html>
